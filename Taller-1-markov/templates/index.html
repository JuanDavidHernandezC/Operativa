<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taller 1: Cadenas de Markov</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            padding-top: 3rem; 
            padding-bottom: 3rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .exercise-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 15px;
            background: #ffffff;
        }
        .exercise-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .animated { 
            animation: fadeInUp 0.6s ease-out forwards; 
            opacity: 0; 
            transform: translateY(20px); 
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center text-primary mb-2 animated fw-bold">Optimización II</h1>
        <h3 class="text-center text-secondary mb-5 animated" style="animation-delay: 0.1s;">Taller 1: Cadenas de Markov</h3>
        
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            {% for ex in exercises %}
            <div class="col animated" style="animation-delay: {{ 0.2 + loop.index0 * 0.1 }}s;">
                <div class="card exercise-card shadow-sm h-100 p-2">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title text-primary mb-0 fw-bold">Problema {{ ex.id }}</h5>
                            {% if ex.active %}
                            <span class="badge bg-success">Completado</span>
                            {% else %}
                            <span class="badge bg-secondary">Pendiente</span>
                            {% endif %}
                        </div>
                        <p class="card-text text-secondary flex-grow-1 fs-5">{{ ex.title }}</p>
                        
                        {% if ex.active %}
                        <a href="{{ ex.url }}" class="btn btn-primary mt-3 py-2 w-100 fw-semibold">Ver Solución</a>
                        {% else %}
                        <button class="btn btn-outline-secondary mt-3 py-2 w-100" disabled>Próximamente</button>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
